version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: department_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dept_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dept_pass}
      POSTGRES_DB: ${POSTGRES_DB:-department_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dept_user} -d ${POSTGRES_DB:-department_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: department_api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-dept_user}:${POSTGRES_PASSWORD:-dept_pass}@db:5432/${POSTGRES_DB:-department_db}
    volumes:
      - ./uploads:/app/uploads
      - ./app:/app/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data: