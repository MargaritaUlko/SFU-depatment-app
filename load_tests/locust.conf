# Locust конфиг для headless-запуска (1000 RPS)
# Применяется автоматически при --config load_tests/locust.conf

host = http://localhost:8000

# ~500 пользователей с wait_time 0.1-0.5s дают ~1000 RPS
users = 500
spawn-rate = 50
run-time = 2m

# Отчёт
html = load_tests/report.html
csv = load_tests/results

# Не останавливаться при первых ошибках
exit-code-on-error = 1
